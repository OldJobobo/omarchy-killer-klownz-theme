$groupBorderColor = rgb(b96bff)

general {
    border_size = 7
    col.active_border = rgba(ff3c8eff) rgba(ff4fd8ff) rgba(b96bffff) rgba(4b6cffff) rgba(2dff6aff) rgba(ffe347ff) rgba(ff3c8eff) 45deg
    col.inactive_border = rgba(1a002066)
}

group {
    col.border_active = $groupBorderColor
}

animations {
    enabled = true

    #         NAME           X1    Y1    X2    Y2
    bezier = klownPop,     0.18, 1.20, 0.35, 1.00  # sharp pop-in, slight overshoot — clown car door
    bezier = klownVanish,  0.55, 0.00, 0.80, 0.00  # fast exit acceleration — disappears in smoke
    bezier = circuitPulse, 0.37, 0.00, 0.63, 1.00  # smooth symmetric ease — alien tech breathing
    bezier = candyFlash,   0.00, 0.80, 0.40, 1.00  # snaps to visible fast — cotton candy pop
    bezier = cosmicSlide,  0.65, 0.00, 0.35, 1.00  # heavy mass in motion — the void shifting

    animation = windows,     1, 4,  klownPop,     slide
    animation = windowsOut,  1, 3,  klownVanish,  popin 80%
    animation = border,      1, 6,  circuitPulse
    animation = borderangle, 1, 80, candyFlash,   loop
    animation = fade,        1, 3,  candyFlash
    animation = workspaces,  1, 4,  cosmicSlide,  slide
}

decoration {
    rounding = 0
    active_opacity = 0.999
    inactive_opacity = 0.9777

    shadow {
        enabled = true
        range = 45
        render_power = 3
        offset = 0 5
        color = rgba(ff4fd8bb)
        color_inactive = rgba(1a002055)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        noise = 0.03
        contrast = 1.07
        brightness = 0.83
        vibrancy = 0.23
        vibrancy_darkness = 0.75
        xray = true
    }
}

# Walker and OSD must be fully opaque — blur would dilute the rule-breaks
layerrule = blur off, match:namespace walker
layerrule = blur off, match:namespace notifications
layerrule = blur off, match:namespace swayosd

# Floating windows get rounding so they feel like objects from another dimension
windowrule {
  name = float-rounding
  rounding = 14
  match:float = true
}

# Terminals handle opacity natively — override Hyprland to prevent stacking
# windowrule {
#   name = terminal-opacity
#   opacity = 1.0 override 1.0 override
#   match:class = ^(foot|kitty|alacritty|ghostty)$
# }

